name: GSSoC — Auto-Label Issues & PRs on Open

# ─────────────────────────────────────────────────────────────────────────────
# Master auto-labelling workflow.
# Runs the moment any issue or PR is opened (or a PR is synchronized).
#
# Issues  → Always gets: GSSoC'26
# PRs     → Always gets: GSSoC'26 + auto difficulty level + mentor:Ayushh-Sharmaa
#
# All label categories (quality, type, validation) are bootstrapped so they
# are ready for maintainers to apply manually at any time.
# ─────────────────────────────────────────────────────────────────────────────
on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Issues
  # ════════════════════════════════════════════════════════════════════════════
  label-issue:
    name: Auto-Label New Issue
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write

    steps:
      - name: Apply GSSoC'26 label to issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const author      = context.payload.issue.user.login;

            // ── Ensure required labels exist ──────────────────────────────────
            const required = [
              { name: "GSSoC'26",          color: '0e8a16', description: "Part of GirlScript Summer of Code 2026" },
              { name: 'level:beginner',    color: '0075ca', description: 'GSSoC: Beginner level contribution (10 pts)' },
              { name: 'level:intermediate',color: 'e4e669', description: 'GSSoC: Intermediate level contribution (25 pts)' },
              { name: 'level:advanced',    color: 'e11d48', description: 'GSSoC: Advanced level contribution (45 pts)' },
              { name: 'level:critical',    color: '7c3aed', description: 'GSSoC: Critical level contribution (60 pts)' },
              { name: 'quality:clean',       color: '22c55e', description: 'GSSoC: Clean, well-written code' },
              { name: 'quality:exceptional', color: 'f59e0b', description: 'GSSoC: Exceptional quality (+bonus pts)' },
              { name: 'type:docs',           color: '0ea5e9', description: 'GSSoC: Documentation contribution' },
              { name: 'type:testing',        color: '0ea5e9', description: 'GSSoC: Testing contribution' },
              { name: 'type:accessibility',  color: '0ea5e9', description: 'GSSoC: Accessibility improvement' },
              { name: 'type:performance',    color: '0ea5e9', description: 'GSSoC: Performance improvement' },
              { name: 'type:security',       color: 'b91c1c', description: 'GSSoC: Security-related contribution' },
              { name: 'type:design',         color: 'a855f7', description: 'GSSoC: Design / UI contribution' },
              { name: 'type:refactor',       color: '64748b', description: 'GSSoC: Code refactoring' },
              { name: 'type:devops',         color: 'f97316', description: 'GSSoC: DevOps / CI-CD contribution' },
              { name: 'type:bug',            color: 'd73a4a', description: 'GSSoC: Bug fix' },
              { name: 'type:feature',        color: '84cc16', description: 'GSSoC: New feature' },
              { name: 'gssoc:approved',      color: '0e8a16', description: 'GSSoC: Approved and scored contribution' },
              { name: 'gssoc:invalid',       color: 'ee0701', description: 'GSSoC: Invalid contribution' },
              { name: 'gssoc:spam',          color: 'ee0701', description: 'GSSoC: Spam contribution' },
              { name: 'gssoc:ai-slop',       color: 'b60205', description: 'GSSoC: AI-generated low-quality contribution' },
              { name: 'mentor:Ayushh-Sharmaa', color: '6f42c1', description: 'GSSoC: Mentor attribution for @Ayushh-Sharmaa' },
            ];

            for (const label of required) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...label });
                  console.log(`✅ Created label: ${label.name}`);
                }
              }
            }

            // ── Apply GSSoC'26 to the issue ───────────────────────────────────
            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: issueNumber,
            });
            const names = current.map(l => l.name);

            const toAdd = [];
            if (!names.includes("GSSoC'26")) toAdd.push("GSSoC'26");

            if (toAdd.length) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: toAdd });
              console.log(`🏷️  Applied [${toAdd.join(', ')}] to issue #${issueNumber}`);
            }

            // ── Welcome comment for new issues ────────────────────────────────
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: [
                `## 👋 Welcome to NexaSphere — GSSoC'26!`,
                ``,
                `Thanks for opening this issue, @${author}!`,
                ``,
                `A maintainer will review and:`,
                `- Assign the appropriate **difficulty label** (\`level:beginner\` → \`level:critical\`)`,
                `- Assign the appropriate **type label** (\`type:bug\`, \`type:feature\`, etc.)`,
                ``,
                `**Before working on this issue:**`,
                `1. Wait for a maintainer to triage and confirm it's valid.`,
                `2. Comment *"Can I work on this?"* to be assigned.`,
                `3. Only submit a PR **after** you are officially assigned.`,
                ``,
                `> 📌 PRs submitted without assignment to the linked issue will be automatically closed.`,
                ``,
                `_GSSoC automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
              ].join('\n'),
            });

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Pull Requests
  # ════════════════════════════════════════════════════════════════════════════
  label-pr:
    name: Auto-Label New PR
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Apply labels and comment on new PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr     = context.payload.pull_request;
            const prNum  = pr.number;
            const author = pr.user.login;

            // ── Skip on subsequent syncs if labels already applied ────────────
            const eventAction = context.payload.action;
            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNum,
            });
            const names = current.map(l => l.name);

            const alreadySetup = names.includes("GSSoC'26");
            if (alreadySetup && eventAction === 'synchronize') {
              console.log('Labels already applied on previous open — skipping.');
              return;
            }

            // ── Ensure all labels exist ───────────────────────────────────────
            const required = [
              { name: "GSSoC'26",            color: '0e8a16', description: "Part of GirlScript Summer of Code 2026" },
              { name: 'level:beginner',      color: '0075ca', description: 'GSSoC: Beginner level contribution (10 pts)' },
              { name: 'level:intermediate',  color: 'e4e669', description: 'GSSoC: Intermediate level contribution (25 pts)' },
              { name: 'level:advanced',      color: 'e11d48', description: 'GSSoC: Advanced level contribution (45 pts)' },
              { name: 'level:critical',      color: '7c3aed', description: 'GSSoC: Critical level contribution (60 pts)' },
              { name: 'quality:clean',       color: '22c55e', description: 'GSSoC: Clean, well-written code' },
              { name: 'quality:exceptional', color: 'f59e0b', description: 'GSSoC: Exceptional quality (+bonus pts)' },
              { name: 'type:docs',           color: '0ea5e9', description: 'GSSoC: Documentation contribution' },
              { name: 'type:testing',        color: '0ea5e9', description: 'GSSoC: Testing contribution' },
              { name: 'type:accessibility',  color: '0ea5e9', description: 'GSSoC: Accessibility improvement' },
              { name: 'type:performance',    color: '0ea5e9', description: 'GSSoC: Performance improvement' },
              { name: 'type:security',       color: 'b91c1c', description: 'GSSoC: Security-related contribution' },
              { name: 'type:design',         color: 'a855f7', description: 'GSSoC: Design / UI contribution' },
              { name: 'type:refactor',       color: '64748b', description: 'GSSoC: Code refactoring' },
              { name: 'type:devops',         color: 'f97316', description: 'GSSoC: DevOps / CI-CD contribution' },
              { name: 'type:bug',            color: 'd73a4a', description: 'GSSoC: Bug fix' },
              { name: 'type:feature',        color: '84cc16', description: 'GSSoC: New feature' },
              { name: 'gssoc:approved',      color: '0e8a16', description: 'GSSoC: Approved and scored contribution' },
              { name: 'gssoc:invalid',       color: 'ee0701', description: 'GSSoC: Invalid contribution' },
              { name: 'gssoc:spam',          color: 'ee0701', description: 'GSSoC: Spam contribution' },
              { name: 'gssoc:ai-slop',       color: 'b60205', description: 'GSSoC: AI-generated low-quality contribution' },
              { name: 'mentor:Ayushh-Sharmaa', color: '6f42c1', description: 'GSSoC: Mentor attribution for @Ayushh-Sharmaa' },
            ];

            for (const label of required) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...label });
                  console.log(`✅ Created label: ${label.name}`);
                }
              }
            }

            // ── Determine auto difficulty level from PR size ──────────────────
            const additions    = pr.additions    || 0;
            const deletions    = pr.deletions    || 0;
            const changedFiles = pr.changed_files || 0;
            const totalChanges = additions + deletions;

            let autoLevel = 'level:beginner';
            if      (totalChanges > 500 || changedFiles > 15) autoLevel = 'level:critical';
            else if (totalChanges > 200 || changedFiles > 8)  autoLevel = 'level:advanced';
            else if (totalChanges > 50  || changedFiles > 3)  autoLevel = 'level:intermediate';

            // ── Apply labels: GSSoC'26 + auto-level + mentor ──────────────────
            const toAdd = [];
            if (!names.includes("GSSoC'26"))           toAdd.push("GSSoC'26");
            if (!names.some(n => n.startsWith('level:'))) toAdd.push(autoLevel);
            if (!names.includes('mentor:Ayushh-Sharmaa')) toAdd.push('mentor:Ayushh-Sharmaa');

            if (toAdd.length) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNum, labels: toAdd });
              console.log(`🏷️  Applied [${toAdd.join(', ')}] to PR #${prNum}`);
            }

            // ── Welcome comment ───────────────────────────────────────────────
            const levelDescriptions = {
              'level:beginner':     '🟦 Beginner (10 pts) — Small change',
              'level:intermediate': '🟨 Intermediate (25 pts) — Medium change',
              'level:advanced':     '🔴 Advanced (45 pts) — Large change',
              'level:critical':     '🟣 Critical (60 pts) — Architecture-level change',
            };

            const isAdmin = ['Ayushh-Sharmaa'].includes(author);

            const commentBody = [
              `## 🚀 GSSoC'26 PR — Thank you, @${author}!`,
              ``,
              `Your PR has been automatically labelled. Here's a summary:`,
              ``,
              `| Label | Value |`,
              `|-------|-------|`,
              `| 📊 Auto-detected level | **${levelDescriptions[autoLevel] || autoLevel}** |`,
              `| 📝 Changes | ${totalChanges} lines across ${changedFiles} file(s) |`,
              `| 🎓 Mentor | [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa) |`,
              ``,
              `**Maintainers may adjust the difficulty label** if the auto-detection is off.`,
              `They can also add:`,
              `- A **type label** \`type:bug\` / \`type:feature\` / \`type:docs\` / etc.`,
              `- A **quality label** \`quality:clean\` / \`quality:exceptional\``,
              `- A **validation label** \`gssoc:approved\` / \`gssoc:invalid\` / \`gssoc:spam\``,
              ``,
              isAdmin
                ? `> 🔑 Admin PR — spam checks skipped.`
                : `> ⚠️  Ensure your PR description contains \`Closes #ISSUE_NUMBER\` and you are **assigned** to that issue, or this PR will be automatically closed by the spam-check workflow.`,
              ``,
              `_GSSoC automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: prNum, body: commentBody });
            console.log(`💬 Welcome comment posted on PR #${prNum}`);
